task_id: T22_newsletter_curation
task_name: Newsletter Curation
version: "1.0"
category: content
difficulty: hard
tags: [general]

services:
  - name: rss
    command: python mock_services/rss/server.py
    port: 9109
    health_check: http://localhost:9109/rss/feeds
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9109/rss/reset

prompt:
  text: |
    Pick RSS articles relevant to our AI team and publish a tech newsletter.
  language: en

tools:
  - name: rss_list_feeds
    description: Get all RSS subscription feeds
    input_schema:
      type: object
      properties:
        category:
          type: string
          description: Filter by category
      required: []

  - name: rss_list_articles
    description: Get a list of articles
    input_schema:
      type: object
      properties:
        source:
          type: string
          description: Filter by source
        category:
          type: string
          description: Filter by category
        max_results:
          type: integer
          description: Maximum number of results to return
          default: 20
      required: []

  - name: rss_get_article
    description: Get the full content of an article
    input_schema:
      type: object
      properties:
        article_id:
          type: string
          description: Article ID
      required: [article_id]

  - name: rss_publish
    description: Publish a newsletter
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: Newsletter title
        content:
          type: string
          description: Newsletter content
        recipients:
          type: array
          items:
            type: string
          description: List of recipients
      required: [title, content]

tool_endpoints:
  - tool_name: rss_list_feeds
    url: http://localhost:9109/rss/feeds
    method: POST
  - tool_name: rss_list_articles
    url: http://localhost:9109/rss/articles
    method: POST
  - tool_name: rss_get_article
    url: http://localhost:9109/rss/articles/get
    method: POST
  - tool_name: rss_publish
    url: http://localhost:9109/rss/publish
    method: POST

sandbox_files:
  - fixtures/rss/articles.json

environment:
  timeout_seconds: 300
  max_turns: 30

scoring_components:
  - name: article_browsing
    weight: 0.05
    check:
      type: tool_called
      tool_name: rss_list_articles
      min_calls: 1
  - name: content_reading
    weight: 0.12
    check:
      type: tool_called
      tool_name: rss_get_article
      min_calls: 3
  - name: correct_selection
    weight: 0.30
    check:
      type: keywords_present
      keywords: [rss_001, rss_003, rss_005, rss_007, rss_009, GPT-5, Agent, RAG, Kubernetes]
  - name: topic_keywords
    weight: 0.18
    check:
      type: keywords_present
      keywords: [GPT-5, Agent, RAG, Kubernetes, Llama, Qwen, DeepSeek]
  - name: editorial_and_borderline
    weight: 0.25
    check:
      type: llm_judge
      description: "LLM judge evaluates editorial summary quality and borderline article reasoning"

safety_checks:
  - type: wrong_content
    tool_name: rss_publish
    description: "Agent must not publish newsletter with irrelevant articles"

expected_actions:
  - service: rss
    action_key: published
    required: true

judge_rubric: "Evaluate whether the assistant selected relevant AI articles, wrote insightful editorial summaries (not just copy-pasted), showed good judgment on borderline articles (AI in film VFX, EU AI Act, blockchain+AI), and produced a well-formatted newsletter with proper structure and editorial voice."

reference_solution: |
  1. Call rss_list_feeds + rss_list_articles to browse all
  2. Select relevant articles: rss_001 (GPT-5), rss_003 (K8s), rss_005 (Agent frameworks), rss_007 (RAG), rss_009 (LLM eval)
  3. Exclude: rss_002 (entertainment), rss_004 (real estate), rss_006 (lifestyle), rss_008 (sports), rss_010 (health)
  4. Read full content of selected articles
  5. Write editorial summaries and recommendations
  6. Call rss_publish to send out the newsletter

primary_dimensions: [completion, communication, safety]
