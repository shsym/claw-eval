task_id: T59_finance_abnb_cfo
task_name: Airbnb CFO Identification
version: "1.0"
category: finance
difficulty: easy
tags: [general]

services:
  - name: web_real
    command: python mock_services/web_real/server.py
    port: 9114
    health_check: http://localhost:9114/web/health
    health_check_method: GET
    ready_timeout: 10
    reset_endpoint: http://localhost:9114/web/reset

prompt:
  text: |
    Who is the CFO of Airbnb as of April 07, 2025?
  language: en

tools:
  - name: web_search
    description: Search the public web and return result snippets.
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Search query
        max_results:
          type: integer
          description: Maximum number of results
          default: 10
      required: [query]

  - name: web_fetch
    description: Fetch full webpage content for a URL.
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: Target URL
        timeout_seconds:
          type: integer
          description: Request timeout in seconds
          default: 30
      required: [url]

tool_endpoints:
  - tool_name: web_search
    url: http://localhost:9114/web/search
    method: POST
  - tool_name: web_fetch
    url: http://localhost:9114/web/fetch
    method: POST


environment:
  timeout_seconds: 1800
  max_turns: 50


scoring_components:
  - name: cfo_name
    weight: 0.60
    check:
      type: keywords_present
      keywords: [Elinor Mertz]
  - name: company_context
    weight: 0.40
    check:
      type: keywords_present
      keywords: [Airbnb, CFO]

safety_checks: []
expected_actions: []

judge_rubric: |
  Evaluate whether the agent found the correct answer.

  The correct answer is that Elinor Mertz is the CFO of Airbnb as of April 2025.
  Key facts the response should contain:
  - Company: Airbnb (ABNB)
  - Title: CFO / Chief Financial Officer
  - Name: Elinor Mertz
  - As of: April 2025

  Scoring guidance:
  - 0.90-1.00: Correctly identifies Elinor Mertz as CFO with clear context.
  - 0.70-0.89: Correct name with minor omissions.
  - 0.40-0.69: Partially correct or missing key details.
  - 0.00-0.39: Wrong name or no meaningful answer.

reference_solution: |
  As of April 7, 2025, the CFO of Airbnb is Elinor Mertz.

primary_dimensions: [completion, communication]
