task_id: T83_officeqa_mad_excise_tax
task_name: "OfficeQA: Mean Absolute Deviation of Excise Tax Receipts (FY2018)"
version: "1.0"
category: office_qa
difficulty: hard
tags: [general]

services:
  - name: ocr_t57
    command: python mock_services/ocr/server.py
    port: 9127
    health_check: http://localhost:9127/ocr/health
    health_check_method: GET
    ready_timeout: 10
    reset_endpoint: http://localhost:9127/ocr/reset
    env:
      OCR_FIXTURES: tasks/T83_officeqa_mad_excise_tax/fixtures
      OCR_FILENAME: treasury_bulletin_2018_12.txt
      PORT: "9127"

prompt:
  text: |
    I have a scanned U.S. Treasury Bulletin from December 2018 (file: treasury_bulletin_2018_12.pdf).
    Please extract the text using OCR, then answer this question:

    What is the Mean Absolute Deviation of nominal monthly net budget receipts of the U.S.
    Federal Government from Excise taxes for FY 2018? Round to the thousandths place and
    report in millions of dollars.

    Please provide a precise numerical answer.
    Put your answer between `<FINAL_ANSWER></FINAL_ANSWER>`.
  language: en

tools:
  - name: ocr_extract_text
    description: Extract text from an image using OCR. Returns the recognized text content.
    input_schema:
      type: object
      properties:
        image_path:
          type: string
          description: Path to the image file to process
      required: [image_path]

tool_endpoints:
  - tool_name: ocr_extract_text
    url: http://localhost:9127/ocr/extract
    method: POST

sandbox_files:
  - fixtures/ocr/treasury_bulletin_2018_12.txt
  - fixtures/pdf/treasury_bulletin_2018_12.pdf

environment:
  timeout_seconds: 300
  max_turns: 15

scoring_components:
  - name: numerical_accuracy
    weight: 0.55
    check:
      type: keywords_present
      keywords: ["1400.306", "1400.30"]
  - name: ocr_tool_usage
    weight: 0.10
    check:
      type: tool_called
      tool_name: ocr_extract_text
  - name: methodology_quality
    weight: 0.35
    check:
      type: llm_judge
      rubric: "MAD computation method (45%) + data extraction (30%) + answer presentation (25%)"

safety_checks: []
expected_actions: []

judge_rubric: |
  Evaluate the COMMUNICATION QUALITY of the agent's response about the Mean Absolute
  Deviation of monthly excise tax receipts for FY2018. Focus on presentation,
  NOT on numerical correctness.

  Scoring criteria:
  - Structure: Is the response well-organized with clear sections or headings?
  - Data: Does it present the 12 monthly values or a summary thereof?
  - Methodology: Does it explain the MAD formula and computation steps clearly?
  - Context: Does it clarify FY2018 period (Oct 2017 - Sep 2018) and units (millions)?
  - Readability: Is the formatting clean (tables, bullet points, bold key figures)?

  Scoring:
  - 0.9-1.0: Excellent structure, monthly data shown, MAD formula explained, well-formatted
  - 0.6-0.8: Decent structure, some data shown with computation outline
  - 0.3-0.5: Minimal structure, answer given but computation poorly presented
  - 0.0-0.2: No structure, confusing or disorganized response

reference_solution: |
  1. ocr_extract_text(image_path="treasury_bulletin_2018_12.pdf")
  2. Extract monthly excise tax receipts for FY2018 (Oct 2017 - Sep 2018)
  3. Compute Mean Absolute Deviation
  4. Report: 1,400.306 million

primary_dimensions: [completion, robustness, communication]
