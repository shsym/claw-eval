task_id: T37zh_incident_postmortem
task_name: Incident Postmortem — Root Cause Analysis
version: "1.0"
category: ops
difficulty: expert
tags: [general]

services:
  - name: helpdesk
    command: python mock_services/helpdesk/server.py
    port: 9107
    health_check: http://localhost:9107/helpdesk/tickets
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9107/helpdesk/reset
    env:
      HELPDESK_FIXTURES: tasks/T37zh_incident_postmortem/fixtures/helpdesk/tickets.json
  - name: config
    command: python mock_services/config/server.py
    port: 9111
    health_check: http://localhost:9111/config/integrations
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9111/config/reset
    env:
      CONFIG_FIXTURES: tasks/T37zh_incident_postmortem/fixtures/config/integrations.json
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/T37zh_incident_postmortem/fixtures/gmail/inbox.json
  - name: kb
    command: python mock_services/kb/server.py
    port: 9106
    health_check: http://localhost:9106/kb/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9106/kb/reset
    env:
      KB_FIXTURES: tasks/T37zh_incident_postmortem/fixtures/kb/articles.json
  - name: notes
    command: python mock_services/notes/server.py
    port: 9105
    health_check: http://localhost:9105/notes/list
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9105/notes/reset
    env:
      NOTES_FIXTURES: tasks/T37zh_incident_postmortem/fixtures/notes/meetings.json
  - name: scheduler
    command: python mock_services/scheduler/server.py
    port: 9112
    health_check: http://localhost:9112/scheduler/jobs
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9112/scheduler/reset
    env:
      SCHEDULER_FIXTURES: tasks/T37zh_incident_postmortem/fixtures/scheduler/jobs.json

prompt:
  text: |
    昨晚（2月28日）生产环境发生了一次重大故障。请帮我做一份事故复盘分析报告：
    1. 收集所有相关工单建立故障时间线
    2. 查看系统集成状态了解当前恢复情况
    3. 查看相关邮件了解技术细节
    4. 检查知识库是否有类似历史事故
    5. 查看会议记录了解近期变更
    6. 检查定时任务了解触发情况
    注意：这是只读分析，不要修改、关闭、通知或更新任何内容。只做数据收集和根因分析。
  language: zh

tools:
  # Helpdesk tools
  - name: helpdesk_list_tickets
    description: 获取工单列表
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "按状态筛选：open, resolved, done, investigating"
        priority:
          type: string
          description: "按优先级筛选：low, medium, high, critical"
        date_from:
          type: string
          description: "起始日期 (ISO 8601)"
        date_to:
          type: string
          description: "截止日期 (ISO 8601)"
      required: []

  - name: helpdesk_get_ticket
    description: 获取单个工单详情
    input_schema:
      type: object
      properties:
        ticket_id:
          type: string
          description: 工单ID
      required: [ticket_id]

  # Config tools
  - name: config_list_integrations
    description: 获取所有第三方集成的列表（概览信息）
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: "按状态筛选：active, degraded, expired"
      required: []

  - name: config_get_integration
    description: 获取单个集成的完整配置信息
    input_schema:
      type: object
      properties:
        integration_id:
          type: string
          description: 集成ID
      required: [integration_id]

  # Gmail tools
  - name: gmail_list_messages
    description: 获取收件箱中的邮件列表
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          description: 获取最近几天的邮件
          default: 7
        max_results:
          type: integer
          description: 最大返回数量
          default: 20
      required: []

  - name: gmail_get_message
    description: 根据邮件ID获取邮件详细内容
    input_schema:
      type: object
      properties:
        message_id:
          type: string
          description: 邮件ID
      required: [message_id]

  # KB tools
  - name: kb_search
    description: 搜索知识库文章
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 搜索关键词
        category:
          type: string
          description: 按分类筛选
        max_results:
          type: integer
          description: 最大返回数量
          default: 5
      required: [query]

  - name: kb_get_article
    description: 获取知识库文章详情
    input_schema:
      type: object
      properties:
        article_id:
          type: string
          description: 文章ID
      required: [article_id]

  # Notes tools
  - name: notes_list
    description: 获取笔记/会议记录列表
    input_schema:
      type: object
      properties:
        date_from:
          type: string
          description: 起始日期
        date_to:
          type: string
          description: 截止日期
        tag:
          type: string
          description: 按标签筛选
      required: []

  - name: notes_get
    description: 获取笔记/会议记录详情
    input_schema:
      type: object
      properties:
        note_id:
          type: string
          description: 笔记ID
      required: [note_id]

  # Scheduler tools
  - name: scheduler_list_jobs
    description: 列出所有定时任务
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: 按最近运行状态筛选 (success/failed/stopped)
        enabled:
          type: boolean
          description: 按启用状态筛选
        tag:
          type: string
          description: 按标签筛选
      required: []

  - name: scheduler_get_job
    description: 获取定时任务详情
    input_schema:
      type: object
      properties:
        job_id:
          type: string
          description: 任务ID
      required: [job_id]

  - name: scheduler_job_history
    description: 查看定时任务执行历史
    input_schema:
      type: object
      properties:
        job_id:
          type: string
          description: 任务ID
        limit:
          type: integer
          description: 返回条数
          default: 10
      required: [job_id]

