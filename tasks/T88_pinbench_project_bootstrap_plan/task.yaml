task_id: T88_pinbench_project_bootstrap_plan
task_name: Pinbench Project Bootstrap Plan
version: "1.0"
category: file_ops
difficulty: medium
tags: [general]

services:
  - name: todo
    command: python mock_services/todo/server.py
    port: 9102
    health_check: http://localhost:9102/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/todo/reset
    env:
      TODO_FIXTURES: tasks/T88_pinbench_project_bootstrap_plan/fixtures/todo/tasks.json

prompt:
  text: |
    Instead of creating files directly, use the todo service to bootstrap a Python
    library project plan for "datautils". Create actionable tasks for:
    1. creating the package structure under src/datautils
    2. adding tests
    3. writing pyproject metadata
    4. writing a README
    Then summarize the setup plan.
  language: en

tools:
  - name: todo_create_task
    description: Create a new todo task
    input_schema:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
        due_date:
          type: string
      required: [title]
  - name: todo_list_tasks
    description: List todo tasks
    input_schema:
      type: object
      properties:
        status:
          type: string
      required: []

tool_endpoints:
  - tool_name: todo_create_task
    url: http://localhost:9102/todo/tasks/create
    method: POST
  - tool_name: todo_list_tasks
    url: http://localhost:9102/todo/tasks
    method: POST

sandbox_files:
  - fixtures/todo/tasks.json

environment:
  timeout_seconds: 180
  max_turns: 10

scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: "Reward a project bootstrap plan that turns the requested scaffold into concrete setup tasks."
reference_solution: "Create four todo items covering package, tests, pyproject, and README work, then summarize the plan."
primary_dimensions: [completion, communication, safety]
