task_id: T78_officeqa_max_yield_spread
task_name: "OfficeQA: Maximum Yield Spread 1960-1969"
version: "1.0"
category: office_qa
difficulty: hard
tags: [general]

services:
  - name: ocr_t52
    command: python mock_services/ocr/server.py
    port: 9122
    health_check: http://localhost:9122/ocr/health
    health_check_method: GET
    ready_timeout: 10
    reset_endpoint: http://localhost:9122/ocr/reset
    env:
      OCR_FIXTURES: tasks/T78_officeqa_max_yield_spread/fixtures
      OCR_FILENAME: treasury_bulletin_1970_06.txt
      PORT: "9122"

prompt:
  text: |
    I have a scanned U.S. Treasury Bulletin from June 1970 (file: treasury_bulletin_1970_06.pdf).
    Please extract the text using OCR, then answer this question:

    Between the calendar years 1960 to 1969 (inclusive), find the month and year in which the
    yield spread between US corporate Aa bonds and US Treasury bonds was maximized. Represent
    the corresponding month and year as a six-digit integer MMYYYY (e.g., March 1965 = 031965).

    Please provide a precise numerical answer.
    Put your answer between `<FINAL_ANSWER></FINAL_ANSWER>`.
  language: en

tools:
  - name: ocr_extract_text
    description: Extract text from an image using OCR. Returns the recognized text content.
    input_schema:
      type: object
      properties:
        image_path:
          type: string
          description: Path to the image file to process
      required: [image_path]

tool_endpoints:
  - tool_name: ocr_extract_text
    url: http://localhost:9122/ocr/extract
    method: POST

sandbox_files:
  - fixtures/ocr/treasury_bulletin_1970_06.txt
  - fixtures/pdf/treasury_bulletin_1970_06.pdf

environment:
  timeout_seconds: 300
  max_turns: 15

scoring_components:
  - name: numerical_accuracy
    weight: 0.55
    check:
      type: keywords_present
      keywords: ["031969"]
  - name: ocr_tool_usage
    weight: 0.10
    check:
      type: tool_called
      tool_name: ocr_extract_text
  - name: analysis_quality
    weight: 0.35
    check:
      type: llm_judge
      rubric: "Spread computation & comparison (45%) + data source (25%) + answer format (30%)"

safety_checks: []
expected_actions: []

judge_rubric: |
  Evaluate the COMMUNICATION QUALITY of the agent's response about the maximum yield
  spread between corporate Aa and Treasury bonds during 1960-1969. Focus on presentation,
  NOT on numerical correctness.

  Scoring criteria:
  - Structure: Is the response well-organized with clear sections or headings?
  - Process: Does it explain how it searched across the 10-year period to find the maximum?
  - Data presentation: Does it show spread values for key months/years, not just the final answer?
  - Format explanation: Does it explain the MMYYYY encoding of the answer?
  - Readability: Is the formatting clean (tables, bullet points, bold key figures)?

  Scoring:
  - 0.9-1.0: Excellent structure, shows comparison data, explains encoding, well-formatted
  - 0.6-0.8: Decent structure with some supporting data and context
  - 0.3-0.5: Minimal structure, answer given but search process unclear
  - 0.0-0.2: No structure, confusing or disorganized response

reference_solution: |
  1. ocr_extract_text(image_path="treasury_bulletin_1970_06.pdf")
  2. Find yield spread data for 1960-1969
  3. Identify the month with maximum spread
  4. Report: 031969

primary_dimensions: [completion, robustness, communication]
