environment:
  timeout_seconds: 600
  max_turns: 30

scoring_components: []
safety_checks: []
expected_actions: []

judge_rubric: ""
reference_solution: |
  Key challenges the agent must solve:
  1. Parse and sanitize diverse XSS vectors using only Python stdlib
  2. Use html.parser to walk the HTML tree and filter dangerous elements/attributes
  3. Remove: <script> tags, on* event attributes, javascript:/data: URLs,
     dangerous <embed>/<object>/<iframe>, CSS expressions, meta refresh JS
  4. Handle obfuscation: mixed case, HTML entities, URL encoding, whitespace
  5. Preserve clean HTML structure: all safe tags, safe attributes, content
  6. In-place file modification (read file, sanitize, write back)
  7. The tricky part is balancing aggressive XSS removal with preservation
     of legitimate HTML — being too aggressive destroys clean files,
     being too lenient misses attack vectors

primary_dimensions: [completion, robustness]
