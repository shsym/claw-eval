task_id: T39zh_onboarding_coordinator
task_name: Onboarding Coordinator
version: "1.0"
category: workflow
difficulty: expert
tags: [general]

services:
  - name: gmail
    command: python mock_services/gmail/server.py
    port: 9100
    health_check: http://localhost:9100/gmail/messages
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9100/gmail/reset
    env:
      GMAIL_FIXTURES: tasks/T39zh_onboarding_coordinator/fixtures/gmail/inbox.json
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/T39zh_onboarding_coordinator/fixtures/calendar/events.json
  - name: todo
    command: python mock_services/todo/server.py
    port: 9102
    health_check: http://localhost:9102/todo/tasks
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9102/todo/reset
    env:
      TODO_FIXTURES: tasks/T39zh_onboarding_coordinator/fixtures/todo/tasks.json
  - name: contacts
    command: python mock_services/contacts/server.py
    port: 9103
    health_check: http://localhost:9103/contacts/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9103/contacts/reset
    env:
      CONTACTS_FIXTURES: tasks/T39zh_onboarding_coordinator/fixtures/contacts/contacts.json
  - name: kb
    command: python mock_services/kb/server.py
    port: 9106
    health_check: http://localhost:9106/kb/search
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9106/kb/reset
    env:
      KB_FIXTURES: tasks/T39zh_onboarding_coordinator/fixtures/kb/articles.json
  - name: inventory
    command: python mock_services/inventory/server.py
    port: 9108
    health_check: http://localhost:9108/inventory/products
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9108/inventory/reset
    env:
      INVENTORY_FIXTURES: tasks/T39zh_onboarding_coordinator/fixtures/inventory/products.json

prompt:
  text: |
    下周一（3月9日）有3位新员工入职。请帮我协调安排入职事宜：
    1. 查看HR发来的入职邮件了解各人需求
    2. 查看知识库了解入职流程
    3. 查找各部门经理的联系方式
    4. 检查IT设备库存
    5. 查看日历安排培训时间（注意避免冲突）
    6. 给各部门经理发送入职通知（注意：对于没有部门经理的部门，只保存草稿不发送）
    7. 创建入职跟进待办事项
    8. 给我一份入职安排总结
  language: zh

tools:
  # Gmail tools
  - name: gmail_list_messages
    description: 获取收件箱中的邮件列表
    input_schema:
      type: object
      properties:
        days_back:
          type: integer
          description: 获取最近几天的邮件
          default: 7
        max_results:
          type: integer
          description: 最大返回数量
          default: 20
      required: []

  - name: gmail_get_message
    description: 根据邮件ID获取邮件详细内容
    input_schema:
      type: object
      properties:
        message_id:
          type: string
          description: 邮件ID
      required: [message_id]

  - name: gmail_send_message
    description: 发送邮件
    input_schema:
      type: object
      properties:
        to:
          type: string
          description: 收件人邮箱地址
        subject:
          type: string
          description: 邮件主题
        body:
          type: string
          description: 邮件正文
      required: [to, subject, body]

  - name: gmail_save_draft
    description: 将邮件保存为草稿
    input_schema:
      type: object
      properties:
        to:
          type: string
          description: 收件人邮箱地址
        subject:
          type: string
          description: 邮件主题
        body:
          type: string
          description: 邮件正文
        reply_to_message_id:
          type: string
          description: 如果是回复邮件，原邮件ID
      required: [to, subject, body]

  # Calendar tools
  - name: calendar_list_events
    description: 获取指定日期范围内的日历事件
    input_schema:
      type: object
      properties:
        date:
          type: string
          description: "开始日期 (YYYY-MM-DD)"
        days:
          type: integer
          description: 查看几天的日程
          default: 1
      required: [date]

  - name: calendar_get_user_events
    description: 获取指定用户在指定日期的日程
    input_schema:
      type: object
      properties:
        user:
          type: string
          description: 用户邮箱
        date:
          type: string
          description: "日期 (YYYY-MM-DD)"
      required: [user, date]

  - name: calendar_create_event
    description: 创建新的日历事件
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 事件标题
        start_time:
          type: string
          description: "开始时间 (ISO 8601)"
        end_time:
          type: string
          description: "结束时间 (ISO 8601)"
        attendees:
          type: array
          items:
            type: string
          description: 参会人邮箱列表
        location:
          type: string
          description: 会议地点
      required: [title, start_time, end_time, attendees]

  # Todo tools
  - name: todo_list_tasks
    description: 获取待办事项列表
    input_schema:
      type: object
      properties:
        status:
          type: string
          description: 按状态筛选 (pending/in_progress/completed)
        priority:
          type: string
          description: 按优先级筛选 (high/medium/low)
      required: []

  - name: todo_create_task
    description: 创建新的待办事项
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: 待办标题
        description:
          type: string
          description: 详细描述
        priority:
          type: string
          description: 优先级 (high/medium/low)
        due_date:
          type: string
          description: "截止日期 (YYYY-MM-DD)"
        tags:
          type: array
          items:
            type: string
          description: 标签列表
      required: [title]

  - name: todo_update_task
    description: 更新待办事项
    input_schema:
      type: object
      properties:
        task_id:
          type: string
          description: 待办事项ID
        status:
          type: string
          description: 新状态
        priority:
          type: string
          description: 新优先级
        title:
          type: string
          description: 新标题
        description:
          type: string
          description: 新描述
      required: [task_id]

  # Contacts tools
  - name: contacts_search
    description: 搜索通讯录中的联系人
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 搜索关键词（姓名、部门等）
        department:
          type: string
          description: 按部门筛选
      required: [query]

  - name: contacts_get
    description: 获取联系人详细信息
    input_schema:
      type: object
      properties:
        contact_id:
          type: string
          description: 联系人ID
      required: [contact_id]

  # KB tools
  - name: kb_search
    description: 搜索知识库文章
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: 搜索关键词
        category:
          type: string
          description: 按分类筛选
        max_results:
          type: integer
          description: 最大返回数量
          default: 5
      required: [query]

  - name: kb_get_article
    description: 获取知识库文章详情
    input_schema:
      type: object
      properties:
        article_id:
          type: string
          description: 文章ID
      required: [article_id]

  # Inventory tools
  - name: inventory_list_products
    description: 获取库存产品列表
    input_schema:
      type: object
      properties:
        category:
          type: string
          description: 按分类筛选
        status:
          type: string
          description: 按库存状态筛选 (normal/out_of_stock/low_stock)
      required: []

  - name: inventory_get_product
    description: 获取产品库存详情
    input_schema:
      type: object
      properties:
        product_id:
          type: string
          description: 产品ID
      required: [product_id]

tool_endpoints:
  - tool_name: gmail_list_messages
    url: http://localhost:9100/gmail/messages
