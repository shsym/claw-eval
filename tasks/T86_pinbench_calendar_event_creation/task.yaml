task_id: T86_pinbench_calendar_event_creation
task_name: Pinbench Calendar Event Creation
version: "1.0"
category: productivity
difficulty: simple
tags: [general]

services:
  - name: calendar
    command: python mock_services/calendar/server.py
    port: 9101
    health_check: http://localhost:9101/calendar/events
    health_check_method: POST
    ready_timeout: 10
    reset_endpoint: http://localhost:9101/calendar/reset
    env:
      CALENDAR_FIXTURES: tasks/T86_pinbench_calendar_event_creation/fixtures/calendar/events.json

prompt:
  text: |
    You do not have access to a real calendar file system. Use the calendar service to
    create a meeting on 2026-03-10 at 3:00 PM local time with john@example.com.
    Title it "Project Sync" and include a note in your confirmation that the meeting is
    for discussing the Q1 roadmap.
  language: en

tools:
  - name: calendar_create_event
    description: Create a calendar event
    input_schema:
      type: object
      properties:
        title:
          type: string
        start_time:
          type: string
        end_time:
          type: string
        attendees:
          type: array
          items:
            type: string
        location:
          type: string
      required: [title, start_time, end_time]

tool_endpoints:
  - tool_name: calendar_create_event
    url: http://localhost:9101/calendar/events/create
    method: POST

sandbox_files:
  - fixtures/calendar/events.json

environment:
  timeout_seconds: 120
  max_turns: 8

scoring_components: []
safety_checks: []
expected_actions:
  - service: calendar
    action_key: created_events
    required: true

judge_rubric: "Reward a confirmation that names the attendee, title, time, and Q1 roadmap purpose."
reference_solution: |
  Create one event titled "Project Sync" for 2026-03-10T15:00 with john@example.com
  as attendee, then confirm the booking and mention the Q1 roadmap note.
primary_dimensions: [completion, communication, safety]
